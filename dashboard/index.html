<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campamento Onawa - Panel de Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --forest: #1a4d2e;
      --forest-light: #2d6a4f;
      --forest-dark: #0f3d2e;
      --gold: #c8a45c;
      --gold-light: #e8d5a3;
      --sage: #7a9e7e;
      --sage-light: #b8d4ba;
      --sand: #f5f0e8;
      --sand-dark: #e8e0d0;
      --coral: #d4735e;
      --coral-light: #e8a090;
      --earth: #8b6f47;
      --text: #2c3e2c;
      --text-light: #5a6b5a;
      --text-muted: #8a9a8a;
      --white: #ffffff;
      --shadow: rgba(26, 58, 42, 0.08);
      --shadow-lg: rgba(26, 58, 42, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--sand);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Layout */
    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--forest);
      color: var(--white);
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      left: 0;
      top: 0;
      z-index: 100;
      box-shadow: 4px 0 20px var(--shadow-lg);
      transition: transform 0.3s ease;
    }

    .sidebar-header {
      padding: 2rem 1.5rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .sidebar-logo img {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      object-fit: cover;
      background: var(--white);
    }

    .sidebar-logo-text {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      line-height: 1.2;
    }

    .sidebar-logo-subtitle {
      font-size: 0.75rem;
      opacity: 0.7;
      font-weight: 500;
      margin-top: 0.2rem;
    }

    .sidebar-nav {
      flex: 1;
      padding: 1.5rem 0;
      overflow-y: auto;
    }

    .nav-section {
      margin-bottom: 1.5rem;
    }

    .nav-section-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.5;
      padding: 0 1.5rem;
      margin-bottom: 0.75rem;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1.5rem;
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.2s ease;
      border-left: 3px solid transparent;
    }

    .nav-item:hover {
      background: rgba(255,255,255,0.08);
      color: var(--white);
    }

    .nav-item.active {
      background: rgba(255,255,255,0.12);
      color: var(--white);
      border-left-color: var(--gold);
    }

    .nav-item svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .nav-item.active svg {
      opacity: 1;
    }

    .sidebar-footer {
      padding: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.1);
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: var(--sage-light);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: 280px;
      min-height: 100vh;
    }

    /* Header */
    .top-header {
      background: var(--white);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--sand-dark);
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 2px 10px var(--shadow);
    }

    .header-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--forest);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .btn {
      padding: 0.6rem 1.25rem;
      border-radius: 10px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--forest);
      color: var(--white);
    }

    .btn-primary:hover {
      background: var(--forest-light);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(26, 77, 46, 0.3);
    }

    .btn-secondary {
      background: var(--sand);
      color: var(--text);
      border: 1px solid var(--sand-dark);
    }

    .btn-secondary:hover {
      background: var(--sand-dark);
    }

    /* Content Area */
    .content {
      padding: 2rem;
      max-width: 1400px;
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--white);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 2px 10px var(--shadow);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--sand-dark);
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 25px var(--shadow-lg);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
    }

    .stat-card.conversations::before { background: var(--sage); }
    .stat-card.messages::before { background: var(--coral); }
    .stat-card.escalated::before { background: var(--earth); }
    .stat-card.interested::before { background: var(--forest-light); }

    .stat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .stat-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--sand);
    }

    .stat-icon svg {
      width: 24px;
      height: 24px;
      color: var(--forest);
    }

    .stat-card.conversations .stat-icon { background: rgba(122, 158, 126, 0.15); }
    .stat-card.messages .stat-icon { background: rgba(212, 115, 94, 0.15); }
    .stat-card.escalated .stat-icon { background: rgba(139, 111, 71, 0.15); }
    .stat-card.interested .stat-icon { background: rgba(45, 106, 79, 0.15); }

    .stat-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-family: 'Montserrat', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--forest);
      line-height: 1;
    }

    .stat-trend {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    /* Section */
    .section {
      margin-bottom: 2rem;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .section-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--forest);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .section-title svg {
      width: 24px;
      height: 24px;
      color: var(--gold);
    }

    /* Filters */
    .filters {
      background: var(--white);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      box-shadow: 0 2px 8px var(--shadow);
      border: 1px solid var(--sand-dark);
    }

    .filters input, .filters select {
      padding: 0.65rem 1rem;
      border: 2px solid var(--sand-dark);
      border-radius: 10px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      transition: all 0.2s ease;
      background: var(--sand);
    }

    .filters input:focus, .filters select:focus {
      outline: none;
      border-color: var(--sage);
      background: var(--white);
    }

    .filters input {
      flex: 1;
      min-width: 200px;
    }

    /* Table */
    .table-card {
      background: var(--white);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 10px var(--shadow);
      border: 1px solid var(--sand-dark);
    }

    .table-header {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      padding: 1rem 1.5rem;
      background: var(--sand);
      border-bottom: 2px solid var(--sand-dark);
      font-weight: 600;
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .conversation-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--sand-dark);
      cursor: pointer;
      transition: all 0.3s ease;
      align-items: center;
    }

    .conversation-row:hover {
      background: var(--sand);
      transform: translateX(4px);
    }

    .conversation-row:last-child {
      border-bottom: none;
    }

    .phone-cell {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .phone-number {
      font-weight: 700;
      color: var(--forest);
      font-size: 1rem;
      font-family: 'Montserrat', sans-serif;
    }

    .phone-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .badge {
      display: inline-block;
      padding: 0.4rem 1rem;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-escalated {
      background: rgba(212, 115, 94, 0.12);
      color: var(--coral);
    }

    .badge-interested {
      background: rgba(45, 106, 79, 0.12);
      color: var(--forest-light);
    }

    .badge-active {
      background: rgba(122, 158, 126, 0.15);
      color: var(--sage);
    }

    .message-count {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.95rem;
      color: var(--text-light);
      font-weight: 600;
    }

    .date-cell {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: 1rem;
      opacity: 0.4;
      color: var(--sage);
    }

    .empty-state-text {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-light);
    }

    .empty-state-sub {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(26, 58, 42, 0.5);
      backdrop-filter: blur(5px);
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }

    .modal-overlay.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal {
      background: var(--white);
      border-radius: 20px;
      width: 90%;
      max-width: 600px;
      max-height: 80vh;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(26, 58, 42, 0.3);
      animation: slideUp 0.3s ease;
      border: 1px solid var(--sand-dark);
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-header {
      padding: 1.5rem 2rem;
      border-bottom: 2px solid var(--sand-dark);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--sand);
    }

    .modal-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--forest);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .modal-title svg {
      width: 20px;
      height: 20px;
      color: var(--gold);
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s ease;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-weight: 600;
    }

    .modal-close:hover {
      color: var(--coral);
      background: rgba(212, 115, 94, 0.1);
    }

    .modal-body {
      padding: 2rem;
      overflow-y: auto;
      max-height: 60vh;
    }

    .message {
      margin-bottom: 1.25rem;
      padding: 1rem 1.25rem;
      border-radius: 14px;
      max-width: 85%;
      position: relative;
      animation: messageIn 0.3s ease;
    }

    @keyframes messageIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.inbound {
      background: var(--sand);
      margin-left: 0;
      border-left: 4px solid var(--sage);
    }

    .message.outbound {
      background: var(--forest);
      color: var(--white);
      margin-left: auto;
      border-right: 4px solid var(--sage-light);
    }

    .message-label {
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .message-content {
      font-size: 0.95rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .message-time {
      font-size: 0.75rem;
      opacity: 0.6;
      margin-top: 0.5rem;
      text-align: right;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 3rem;
      color: var(--text-muted);
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--sand-dark);
      border-top-color: var(--forest);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Skeleton Loaders */
    .skeleton {
      background: linear-gradient(90deg, var(--sand-dark) 25%, var(--sand) 50%, var(--sand-dark) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-card {
      height: 120px;
      border-radius: 16px;
      margin-bottom: 1.5rem;
    }

    .skeleton-row {
      height: 60px;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .skeleton-text {
      height: 16px;
      border-radius: 4px;
      margin-bottom: 8px;
    }

    .skeleton-title {
      height: 24px;
      border-radius: 4px;
      width: 60%;
      margin-bottom: 16px;
    }

    .skeleton-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
    }

    /* Mobile Menu Toggle */
    .menu-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem;
      color: var(--forest);
    }

    .menu-toggle svg {
      width: 24px;
      height: 24px;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .sidebar {
        transform: translateX(-100%);
      }
      
      .sidebar.open {
        transform: translateX(0);
      }
      
      .main-content {
        margin-left: 0;
      }
      
      .menu-toggle {
        display: block;
      }
      
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      .content {
        padding: 1rem;
      }
      
      .stats-grid {
        grid-template-columns: 1fr;
      }
      
      .stat-value {
        font-size: 1.8rem;
      }
      
      .table-header,
      .conversation-row {
        grid-template-columns: 1fr;
        gap: 0.5rem;
      }
      
      .table-header {
        display: none;
      }
      
      .conversation-row {
        padding: 1rem;
      }
      
      .filters {
        flex-direction: column;
      }
      
      .filters input {
        width: 100%;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.3);
    }

    .main-content ::-webkit-scrollbar-thumb {
      background: #ccc;
    }

    .main-content ::-webkit-scrollbar-thumb:hover {
      background: #aaa;
    }
  </style>
</head>
<body>

    <!-- Sidebar -->

      <div class="sidebar-header">
        <div class="sidebar-logo">
          <img src="../assets/logo.png" alt="Campamento Onawa">
          <div>
            <div class="sidebar-logo-text">Onawa</div>
            <div class="sidebar-logo-subtitle">Panel de Control</div>
          </div>
        </div>
      </div>
      
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Principal</div>

              <rect x="3" y="3" width="7" height="7"/>
              <rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/>
            </svg>
            Dashboard
          </a>
          <a href="chats.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
            Conversaciones
            <span class="badge badge-interested" style="margin-left: auto; font-size: 0.65rem; padding: 0.2rem 0.5rem;">Nuevo</span>
          </a>
        </div>
        
        <div class="nav-section">
          <div class="nav-section-title">Monitoreo</div>
          <a href="stats.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20v-6M6 20V10M18 20V4"/>
            </svg>
            Estadísticas
          </a>
          <a href="alerts.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
            Alertas
            <span class="badge badge-interested" id="alertBadge" style="margin-left: auto; font-size: 0.65rem; padding: 0.2rem 0.5rem; display: none;">0</span>
          </a>
        </div>
        
        <div class="nav-section">
          <div class="nav-section-title">Configuración</div>
          <a href="settings.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            Ajustes
          </a>
        </div>
      </nav>
      
      <div class="sidebar-footer">
        <div class="live-badge">
          <span class="live-dot"></span>
          <span>Bot en vivo</span>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
      <header class="top-header">
        <div style="display: flex; align-items: center; gap: 1rem;">
          <button class="menu-toggle" onclick="toggleSidebar()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <h1 class="header-title">Dashboard</h1>
        </div>
        <div class="header-actions">
          <button class="btn btn-secondary" onclick="refreshData()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 4v6h-6M1 20v-6h6"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
            Actualizar
          </button>
        </div>
      </header>

      <main class="content">
        <!-- Stats -->
        <div class="stats-grid" id="stats">
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
        </div>

        <!-- Conversations Section -->
        <div class="section">
          <div class="section-header">
            <h2 class="section-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
              </svg>
              Conversaciones Recientes
            </h2>
            <a href="chats.html" class="btn btn-primary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
              </svg>
              Ver todos
            </a>
          </div>

          <div class="filters">
            <input type="text" id="search" placeholder="Buscar por teléfono...">
            <select id="status">
              <option value="">Todos los estados</option>
              <option value="escalated">Escalados</option>
              <option value="interested">Interesados</option>
            </select>
            <button class="btn btn-primary" onclick="loadConversations()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.35-4.35"/>
              </svg>
              Filtrar
            </button>
          </div>

          <div class="table-card">
            <div class="table-header">
              <div>Teléfono</div>
              <div>Estado</div>
              <div>Mensajes</div>
              <div>Fecha</div>
            </div>
            <div id="conversations">
              <div class="skeleton skeleton-row"></div>
              <div class="skeleton skeleton-row"></div>
              <div class="skeleton skeleton-row"></div>
              <div class="skeleton skeleton-row"></div>
              <div class="skeleton skeleton-row"></div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
          </svg>
          <span id="modalTitle">Conversación</span>
        </h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    const API_URL = '/api/dashboard';

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    async function loadStats() {
      try {
        const response = await fetch(`${API_URL}/stats`);
        const data = await response.json();
        
        const statsHtml = `
          <div class="stat-card conversations">
            <div class="stat-header">
              <div class="stat-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
                </svg>
              </div>
            </div>
            <div class="stat-label">Conversaciones</div>
            <div class="stat-value">${data.stats.totalConversations}</div>
            <div class="stat-trend">Total acumulado</div>
          </div>
          <div class="stat-card messages">
            <div class="stat-header">
              <div class="stat-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                </svg>
              </div>
            </div>
            <div class="stat-label">Mensajes</div>
            <div class="stat-value">${data.stats.totalMessages}</div>
            <div class="stat-trend">Interacciones totales</div>
          </div>
          <div class="stat-card escalated">
            <div class="stat-header">
              <div class="stat-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                  <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
              </div>
            </div>
            <div class="stat-label">Escalados</div>
            <div class="stat-value">${data.stats.escalatedCount}</div>
            <div class="stat-trend">Derivados a asesor</div>
          </div>
          <div class="stat-card interested">
            <div class="stat-header">
              <div class="stat-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                </svg>
              </div>
            </div>
            <div class="stat-label">Interesados</div>
            <div class="stat-value">${data.stats.interestedCount}</div>
            <div class="stat-trend">Potenciales clientes</div>
          </div>
        `;
        
        document.getElementById('stats').innerHTML = statsHtml;
      } catch (error) {
        document.getElementById('stats').innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <div class="empty-state-text">Error cargando estadísticas</div>
          </div>
        `;
      }
    }

    async function loadConversations() {
      const search = document.getElementById('search').value;
      const status = document.getElementById('status').value;
      
      try {
        const params = new URLSearchParams();
        if (search) params.append('search', search);
        if (status) params.append('status', status);
        
        const response = await fetch(`${API_URL}/conversations?${params}`);
        const data = await response.json();
        
        if (data.conversations.length === 0) {
          document.getElementById('conversations').innerHTML = `
            <div class="empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
              </svg>
              <div class="empty-state-text">No hay conversaciones aún</div>
              <div class="empty-state-sub">Cuando alguien escriba al bot, aparecerá aquí</div>
            </div>
          `;
          return;
        }
        
        const conversationsHtml = data.conversations.map(conv => {
          const badgeClass = conv.isEscalated ? 'badge-escalated' : 
                            conv.isInterested ? 'badge-interested' : 'badge-active';
          const badgeText = conv.isEscalated ? 'Escalado' : 
                           conv.isInterested ? 'Interesado' : 'Activo';
          
          return `
            <div class="conversation-row" onclick="showConversation('${conv.phone}')">
              <div class="phone-cell">
                <div class="phone-number">${conv.phone}</div>
                <div class="phone-meta">${conv.messages.length} mensajes</div>
              </div>
              <div>
                <span class="badge ${badgeClass}">${badgeText}</span>
              </div>
              <div class="message-count">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                </svg>
                <span>${conv.message_count}</span>
              </div>
              <div class="date-cell">
                ${new Date(conv.createdAt).toLocaleDateString('es-MX', {
                  day: 'numeric',
                  month: 'short',
                  hour: '2-digit',
                  minute: '2-digit'
                })}
              </div>
            </div>
          `;
        }).join('');
        
        document.getElementById('conversations').innerHTML = conversationsHtml;
      } catch (error) {
        document.getElementById('conversations').innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <div class="empty-state-text">Error cargando conversaciones</div>
          </div>
        `;
      }
    }

    async function showConversation(phone) {
      try {
        const response = await fetch(`${API_URL}/conversation?phone=${phone}`);
        const data = await response.json();
        
        document.getElementById('modalTitle').innerText = phone;
        
        const messagesHtml = data.contact.messages.map(msg => {
          const direction = msg.direction === 'inbound' ? 'inbound' : 'outbound';
          const label = msg.direction === 'inbound' ? 'Usuario' : 'Bot';
          
          return `
            <div class="message ${direction}">
              <div class="message-label">${label}</div>
              <div class="message-content">${msg.content}</div>
              <div class="message-time">
                ${new Date(msg.timestamp).toLocaleString('es-MX', {
                  day: 'numeric',
                  month: 'short',
                  hour: '2-digit',
                  minute: '2-digit'
                })}
              </div>
            </div>
          `;
        }).join('');
        
        document.getElementById('modalBody').innerHTML = messagesHtml || `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
            <div class="empty-state-text">No hay mensajes aún</div>
          </div>
        `;
        
        document.getElementById('modalOverlay').classList.add('active');
      } catch (error) {
        alert('Error cargando conversación');
      }
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    function refreshData() {
      loadStats();
      loadConversations();
    }

    // Close modal on outside click
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) {
        closeModal();
      }
    });

    // Close modal on escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeModal();
      }
    });

    // Close sidebar on outside click (mobile)
    document.addEventListener('click', function(e) {
      const sidebar = document.getElementById('sidebar');
      const menuToggle = document.querySelector('.menu-toggle');
      if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
        sidebar.classList.remove('open');
      }
    });

    // Initial load
    loadStats();
    loadConversations();
    
    // Refresh every 15 seconds
    setInterval(() => {
      loadStats();
      loadConversations();
    }, 15000);
  </script>
</body>
</html>
